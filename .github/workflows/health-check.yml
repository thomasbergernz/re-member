name: Health check

# Triggers the Cloudflare Worker (itdocsnow-health-alert) every 5 minutes.
# The Worker probes /api/health on the production Fly app and posts to Slack
# on failure.
# Worker URL is public; the CHECK_TOKEN is verified by the Worker.

on:
  schedule:
    # Every 5 min. GitHub may delay cron by a few min — that's fine.
    - cron: "*/5 * * * *"
  workflow_dispatch:
    # Manual trigger for testing.

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    # Self-disable until Phase 8 sets the Worker URL + Phase 10 sets the
    # GH token. Without these, the cron fires every 5 min and fails.
    if: ${{ secrets.REMEMBER_HEALTH_CHECK_TOKEN != '' && vars.REMEMBER_HEALTH_ALERT_URL != '' }}
    steps:
- name: Trigger itdocsnow-health-alert Worker
        run: |
          set -euo pipefail
          # Capture body + HTTP status. Don't use -f: we want to print the body
          # on errors, then fail the step ourselves on any non-2xx so a broken
          # token or undelivered Slack alert (worker 502) turns the run red.
          response=$(curl -sS -X POST \
            "${REMEMBER_HEALTH_ALERT_URL:-https://remember-health-alert.workers.dev}/check" \
            -H "Authorization: Bearer ${{ secrets.REMEMBER_HEALTH_CHECK_TOKEN }}" \
            -w $'\n%{http_code}')
          http_code=$(printf '%s' "$response" | tail -n1)
          body=$(printf '%s' "$response" | sed '$d')
          echo "$body"
          echo "--- HTTP $http_code"
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::health-alert worker returned HTTP $http_code"
            exit 1
          fi
