# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/
name: Fly Deploy Production
on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch, tag, or SHA) to deploy
        required: true
        default: main
jobs:
  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    environment: production
    concurrency: deploy-production
    # Self-disable until Phase 10 sets the secret. Even at workflow_dispatch,
    # an empty token produces a confusing auth error — better to skip cleanly.
    if: ${{ secrets.FLY_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.ref }}
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --app itdocsnow-production
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
