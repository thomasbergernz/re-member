name: Test

# Gate every PR and every push to main on the full suite. The deploy workflows
# (fly-deploy*.yml) build and ship but run NO tests — so a green-locally /
# never-run suite could not catch regressions like bug-004 (stale route → 404)
# or bug-005 (swallowed email error) before they reached production. This is
# that gate.
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unit:
    name: Unit + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test

  e2e:
    name: E2E smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # External services are neutralised by the E2E_STUB server shim, injected
      # via playwright.config.ts -> webServer.env. No real secrets required.
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
