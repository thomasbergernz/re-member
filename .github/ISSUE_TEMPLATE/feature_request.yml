name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the admin/volunteer/member pain point, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: audience
    attributes:
      label: Who benefits?
      options:
        - Members (applicants, renewers)
        - Volunteer admins
        - Deployers / integrators
        - Multiple / other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
